<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Emotion Detection</title>
    <link rel="stylesheet" href="/static/mywebstyle.css">
    <script src="/static/mywebscript.js"></script>
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>Emotion Detection Application</h1>
            <p class="subtitle">Analyze the emotion of your text using Watson NLP.</p>

            <label for="textToAnalyze">Enter text to analyze:</label>
            <textarea id="textToAnalyze" rows="5" placeholder="Example: I am very happy today!"></textarea>

            <button onclick="RunSentimentAnalysis()">Analyze Emotion</button>

            <div id="system_response" class="result-box">
                The result will appear here.
            </div>
        </section>
    </main>
</body>
</html>
